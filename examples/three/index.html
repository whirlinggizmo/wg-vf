<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vf-stage</title>
    <link rel="icon" type="image/png" href="/img/favicon.png" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f2efe8;
        --panel: rgba(255, 252, 245, 0.9);
        --panel-border: rgba(37, 28, 19, 0.12);
        --text: #241a12;
        --muted: #6d5a4b;
        --accent: #1e6bb8;
        --accent-soft: rgba(30, 107, 184, 0.12);
      }

      html, body {
        height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 40%),
          linear-gradient(160deg, #ece6da 0%, #f6f2eb 50%, #e7dfd1 100%);
        color: var(--text);
        font-family: "Iosevka Web", "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
      }

      body {
        min-height: 100vh;
      }

      #app {
        height: 100vh;
        display: grid;
        grid-template-columns: 320px 1fr;
      }

      #app[hidden] {
        display: none !important;
      }

      #sidebar {
        padding: 12px;
        font-size: 12px;
        overflow: auto;
        border-right: 1px solid #222;
        background: #fff;
      }

      #viewport {
        position: relative;
        min-height: 100vh;
        background: #f7f7f7;
      }

      #launcher {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        box-sizing: border-box;
        z-index: 100;
      }

      #launcher[hidden] {
        display: none !important;
      }

      .launcher-card {
        width: min(680px, 100%);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(50, 33, 14, 0.12);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .launcher-header {
        padding: 24px 24px 12px;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 8px 0 6px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1;
      }

      .intro {
        margin: 0;
        color: var(--muted);
        max-width: 42ch;
        line-height: 1.5;
      }

      .client-list {
        list-style: none;
        margin: 0;
        padding: 12px 16px 20px;
      }

      .client-list li + li {
        margin-top: 10px;
      }

      .client-link {
        display: grid;
        gap: 6px;
        padding: 16px;
        border-radius: 14px;
        color: inherit;
        text-decoration: none;
        border: 1px solid transparent;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(245, 238, 229, 0.9));
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      .client-link:hover {
        transform: translateY(-1px);
        border-color: rgba(30, 107, 184, 0.28);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(232, 242, 251, 0.95));
      }

      .client-title {
        font-size: 15px;
      }

      .client-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .client-tag {
        display: inline-block;
        width: fit-content;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        color: var(--accent);
        background: var(--accent-soft);
      }
    </style>
  </head>
  <body>
    <div id="launcher"></div>

    <div id="app" hidden>
      <div id="sidebar"></div>
      <div id="viewport"></div>
    </div>

    <script type="module" src="./src/index.ts"></script>
  </body>
</html>
